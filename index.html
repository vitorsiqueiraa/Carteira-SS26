<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carteira SS26 — Lacoste</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --g900:#0e4a1c;--g700:#1a6b2a;--g500:#2d8f45;--g400:#4caf64;--g200:#b8dfc2;
  --g100:#e8f5ec;--g50:#f2fbf4;
  --white:#fff;--off:#f7faf8;
  --gray50:#f0f2f0;--gray100:#e2e7e3;--gray200:#c5cec6;--gray400:#7e917f;
  --gray600:#3d4e3e;--gray900:#1a241b;
  --red:#c0392b;--orange:#e67e22;--blue:#2471a3;--teal:#1a7a6b;
  --shadow-sm:0 1px 4px rgba(14,74,28,.08);
  --shadow-md:0 4px 16px rgba(14,74,28,.10);
  --r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--gray900);font-size:14px;line-height:1.4}
/* HEADER */
.hdr{background:var(--g700);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{width:40px;height:40px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-logo svg{width:28px;height:28px}
.hdr-title{color:#fff;font-size:15px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.hdr-sub{color:rgba(255,255,255,.6);font-size:10px;letter-spacing:.1em;font-weight:400}
.hdr-right{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.02em;border:none}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-ghost:hover{background:rgba(255,255,255,.25)}
/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:18px 16px 32px}
/* FILTERS */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--gray100);box-shadow:var(--shadow-sm);padding:16px 18px;margin-bottom:14px}
.card-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray400);margin-bottom:12px}
.filters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.fg label{display:block;font-size:10px;font-weight:600;color:var(--gray400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.fg select,.fg input{width:100%;padding:7px 10px;border:1px solid var(--gray100);border-radius:var(--r-sm);font-family:inherit;font-size:13px;color:var(--gray900);background:var(--gray50);outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s,box-shadow .15s}
.fg select:focus,.fg input:focus{border-color:var(--g500);box-shadow:0 0 0 3px rgba(45,143,69,.12);background:#fff}
.sel-wrap{position:relative}
.sel-wrap::after{content:'';position:absolute;right:10px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-top-color:var(--gray400);pointer-events:none}
.f-actions{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-clear{background:none;border:1px solid var(--gray200);border-radius:var(--r-sm);color:var(--gray600);font-family:inherit;font-size:12px;padding:6px 14px;cursor:pointer;transition:all .15s}
.btn-clear:hover{border-color:var(--g500);color:var(--g700)}
.r-count{font-size:12px;color:var(--gray400);margin-left:auto}
.r-count span{font-weight:700;color:var(--g700)}
/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:14px}
.kpi{background:var(--white);border-radius:var(--r);border:1px solid var(--gray100);box-shadow:var(--shadow-sm);padding:15px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.kpi.c-green::before{background:var(--g500)}
.kpi.c-blue::before{background:var(--blue)}
.kpi.c-orange::before{background:var(--orange)}
.kpi.c-red::before{background:var(--red)}
.kpi.c-teal::before{background:var(--teal)}
.kpi.c-gray::before{background:var(--gray200)}
.kpi-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--gray400);margin-bottom:7px}
.kpi-val{font-size:19px;font-weight:700;letter-spacing:-.02em;line-height:1}
.kpi-sub{font-size:11px;color:var(--gray400);margin-top:4px}
.kpi-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:5px}
.kpi-badge.g{background:var(--g100);color:var(--g700)}
.kpi-badge.r{background:#fdedec;color:var(--red)}
.kpi-badge.o{background:#fef5ec;color:var(--orange)}
/* CHARTS ROW */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.charts-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.chart-card{background:var(--white);border-radius:var(--r);border:1px solid var(--gray100);box-shadow:var(--shadow-sm);padding:16px 18px}
.chart-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray400);margin-bottom:12px}
.chart-wrap{position:relative}
/* TABLE */
.tbl-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.tbl-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray400)}
.tbl-wrap{overflow-x:auto;border-radius:var(--r-sm);border:1px solid var(--gray100)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--gray50)}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--gray400);white-space:nowrap;border-bottom:1px solid var(--gray100);cursor:pointer;user-select:none;transition:color .15s}
th:hover{color:var(--g700)}
th.sorted{color:var(--g700)}
tbody tr{border-bottom:1px solid var(--gray50);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--g50)}
td{padding:8px 12px;font-size:12px;white-space:nowrap}
td.mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--gray600)}
td.money{font-family:'DM Mono',monospace;font-size:11px;text-align:right}
td.money.g{color:var(--g700);font-weight:500}
td.money.o{color:var(--orange)}
td.money.r{color:var(--red)}
td.money.b{color:var(--blue)}
.bdg{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.bdg-mm{background:var(--g100);color:var(--g700)}
.bdg-ka{background:#e8f0fb;color:var(--blue)}
.bdg-com{background:#fdedec;color:var(--red)}
.bdg-fin{background:#fef5ec;color:var(--orange)}
.bdg-cart{background:var(--g100);color:var(--g700)}
.bdg-pe{background:#e8f0fb;color:var(--blue)}
/* MAP */
#map-svg{width:100%;height:auto}
.uf-label{font-size:9px;font-weight:600;fill:#fff;pointer-events:none;dominant-baseline:middle;text-anchor:middle}
.map-legend{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.map-legend-grad{width:120px;height:10px;border-radius:5px;background:linear-gradient(to right,#e8f5ec,#0e4a1c)}
.map-legend-txt{font-size:10px;color:var(--gray400)}
/* Pagination */
.pag{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.pbtn{background:var(--gray50);border:1px solid var(--gray100);border-radius:var(--r-sm);padding:4px 9px;font-family:inherit;font-size:12px;cursor:pointer;color:var(--gray600);transition:all .15s}
.pbtn:hover:not(:disabled){background:var(--g100);border-color:var(--g500);color:var(--g700)}
.pbtn:disabled{opacity:.35;cursor:not-allowed}
.pbtn.active{background:var(--g700);color:#fff;border-color:var(--g700)}
.footer{text-align:center;padding:20px;font-size:10px;color:var(--gray200);letter-spacing:.08em}
/* Mobile */
@media(max-width:700px){
  .charts-grid,.charts-grid-3{grid-template-columns:1fr}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .main{padding:12px 10px 24px}
  .hdr-sub{display:none}
}
@media(max-width:420px){
  .kpis{grid-template-columns:1fr 1fr;gap:8px}
  .kpi-val{font-size:16px}
}
</style>
</head>

<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">
      <svg viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="35" rx="46" ry="18" fill="#1a6b2a"/>
        <ellipse cx="50" cy="30" rx="38" ry="13" fill="#2d8f45"/>
        <circle cx="78" cy="18" r="8" fill="#1a6b2a"/>
        <circle cx="78" cy="16" r="4" fill="#4caf64"/>
        <path d="M12 35 Q8 28 14 24 Q22 20 30 22 Q36 18 42 16 Q52 12 62 14 Q70 12 76 16 Q82 14 84 20 Q82 26 76 26 Q68 24 62 26 Q54 28 48 30 Q40 32 32 34 Q24 36 18 36 Z" fill="#2d8f45"/>
        <path d="M12 35 Q8 28 14 24 Q22 20 30 22" fill="none" stroke="#1a6b2a" stroke-width="1"/>
      </svg>
    </div>
    <div>
      <div class="hdr-title">Carteira SS26</div>
      <div class="hdr-sub">Acompanhamento de Pedidos · Uso Interno</div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-ghost" onclick="exportCSV()">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M12 15V3m0 12l-4-4m4 4l4-4M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/></svg>
      <span>CSV</span>
    </button>
  </div>
</header>

<div class="main">
  <!-- FILTERS -->
  <div class="card">
    <div class="card-title">Filtros</div>
    <div class="filters-grid">
      <div class="fg"><label>Canal</label><div class="sel-wrap"><select id="f-canal" onchange="applyFilters()"><option value="">Todos</option></select></div></div>
      <div class="fg"><label>Representante</label><div class="sel-wrap"><select id="f-rep" onchange="applyFilters()"><option value="">Todos</option></select></div></div>
      <div class="fg"><label>Nome Fantasia</label><input type="text" id="f-cliente" placeholder="Buscar..." oninput="applyFilters()"></div>
      <div class="fg"><label>Tipo Bloqueio</label><div class="sel-wrap"><select id="f-bloqueio" onchange="applyFilters()"><option value="">Todos</option><option value="__none__">Sem Bloqueio</option></select></div></div>
      <div class="fg"><label>Tipo Pedido</label><div class="sel-wrap"><select id="f-tipopedido" onchange="applyFilters()"><option value="">Todos</option></select></div></div>
      <div class="fg"><label>UF</label><div class="sel-wrap"><select id="f-uf" onchange="applyFilters()"><option value="">Todas</option></select></div></div>
    </div>
    <div class="f-actions">
      <button class="btn-clear" onclick="clearFilters()">Limpar Filtros</button>
      <div class="r-count" id="r-count"></div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpis" id="kpis"></div>

  <!-- CHARTS ROW 1: Bar chart (full width) -->
  <div class="card" style="margin-bottom:14px">
    <div class="chart-title">Total Pedido vs Faturado por Representante (R$)</div>
    <div class="chart-wrap" style="height:280px"><canvas id="chart-bar"></canvas></div>
  </div>

  <!-- CHARTS ROW 2: Pizza + Rosca + Mapa -->
  <div class="charts-grid-3">
    <div class="chart-card">
      <div class="chart-title">Tipo de Bloqueio — Total R$</div>
      <div class="chart-wrap" style="height:240px"><canvas id="chart-pie"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Tipo de Pedido — Total R$</div>
      <div class="chart-wrap" style="height:240px"><canvas id="chart-donut"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Mapa Térmico por UF — Total R$</div>
      <div id="map-container"></div>
      <div class="map-legend">
        <span class="map-legend-txt">Menor</span>
        <div class="map-legend-grad"></div>
        <span class="map-legend-txt">Maior</span>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card">
    <div class="tbl-hdr">
      <div class="tbl-title">Clientes por Representante</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:11px;color:var(--gray400)" id="pg-info"></span>
        <div class="pag" id="pagination"></div>
      </div>
    </div>
    <div class="tbl-wrap">
      <table><thead><tr id="tbl-head"></tr></thead><tbody id="tbl-body"></tbody></table>
    </div>
  </div>
</div>

<div class="footer">LACOSTE · SS26 · Uso Interno</div>

":121191.34,"faturadoR":114544.92,"separacaoR":0.0,"alocadoR":1840.63,"naoAlocadoR":4805.79,"bloqR":0.0,"totalQty":570,"faturadoQty":539,"pedidos":23},{"rep":"W VIX","cliente":"WF MODA INFANTIL LTDA","canal":"MULTIMARCAS","uf":"ES","tipoPedido":"CARTEIRA","tipoBloqueio":"FINANCEIRO","totalR":47112.43,"faturadoR":47112.43,"separacaoR":0.0,"alocadoR":0.0,"naoAlocadoR":0.0,"bloqR":0.0,"totalQty":223,"faturadoQty":223,"pedidos":8}];
const UF_COORDS = {"AC": [-9.02, -70.81], "AL": [-9.57, -36.78], "AP": [1.41, -51.77], "AM": [-3.47, -65.1], "BA": [-12.96, -41.71], "CE": [-5.2, -39.53], "DF": [-15.78, -47.93], "ES": [-19.19, -40.34], "GO": [-15.83, -49.84], "MA": [-5.42, -45.44], "MT": [-12.64, -55.42], "MS": [-20.51, -54.54], "MG": [-18.51, -44.55], "PA": [-3.79, -52.48], "PB": [-7.24, -36.78], "PR": [-24.89, -51.55], "PE": [-8.38, -37.86], "PI": [-7.72, -42.73], "RJ": [-22.25, -42.66], "RN": [-5.81, -36.59], "RS": [-30.17, -53.5], "RO": [-10.83, -63.34], "RR": [2.73, -62.08], "SC": [-27.45, -50.95], "SE": [-10.57, -37.45], "SP": [-22.28, -48.54], "TO": [-10.25, -48.25]};

// state
let filtered = [...RAW];
let sortCol = 'totalR', sortDir = -1;
let page = 1;
const PG = 50;

const COLS = [
  {k:'rep',      l:'Representante', t:'text'},
  {k:'cliente',  l:'Nome Fantasia',  t:'text'},
  {k:'canal',    l:'Canal',          t:'bdg-canal'},
  {k:'uf',       l:'UF',             t:'text'},
  {k:'tipoPedido',l:'Tipo Pedido',   t:'bdg-tp'},
  {k:'tipoBloqueio',l:'Bloqueio',    t:'bdg-blq'},
  {k:'pedidos',  l:'Pedidos',        t:'num'},
  {k:'totalR',   l:'Total (R$)',     t:'money'},
  {k:'faturadoR',l:'Faturado (R$)',  t:'money-g'},
  {k:'separacaoR',l:'Em Sep. (R$)',  t:'money-b'},
  {k:'alocadoR', l:'Alocado (R$)',   t:'money-o'},
  {k:'naoAlocadoR',l:'Não Aloc.(R$)',t:'money-r'},
];

const fmt = v => v == null || v === '' ? '—' : typeof v === 'number' ? v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : v;
const fmtM = v => !v && v!==0 ? '—' : v>=1e6 ? 'R$ '+(v/1e6).toFixed(1)+'M' : v>=1e3 ? 'R$ '+(v/1e3).toFixed(0)+'K' : 'R$ '+v.toFixed(0);
const sum = (arr, k) => arr.reduce((s,r) => s+(r[k]||0), 0);
const pct = (a,b) => b ? (a/b*100) : 0;

// Charts references
let barChart, pieChart, donutChart;

function populateFilters() {
  const uniq = k => [...new Set(RAW.map(r=>r[k]).filter(v=>v&&v.toString().trim()!=''))].sort();
  const add = (id, vals) => { const s=document.getElementById(id); vals.forEach(v=>{ const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o); }); };
  add('f-canal', uniq('canal'));
  add('f-rep', uniq('rep'));
  add('f-bloqueio', uniq('tipoBloqueio'));
  add('f-tipopedido', uniq('tipoPedido'));
  add('f-uf', uniq('uf'));
}

function applyFilters() {
  const canal = document.getElementById('f-canal').value;
  const rep = document.getElementById('f-rep').value;
  const cliente = document.getElementById('f-cliente').value.toLowerCase().trim();
  const bloqueio = document.getElementById('f-bloqueio').value;
  const tipoPedido = document.getElementById('f-tipopedido').value;
  const uf = document.getElementById('f-uf').value;
  filtered = RAW.filter(r => {
    if (canal && r.canal !== canal) return false;
    if (rep && r.rep !== rep) return false;
    if (cliente && !r.cliente.toLowerCase().includes(cliente)) return false;
    if (bloqueio === '__none__' && r.tipoBloqueio !== '') return false;
    if (bloqueio && bloqueio !== '__none__' && r.tipoBloqueio !== bloqueio) return false;
    if (tipoPedido && r.tipoPedido !== tipoPedido) return false;
    if (uf && r.uf !== uf) return false;
    return true;
  });
  // default sort
  doSort(sortCol, false);
  page = 1;
  renderAll();
}

function clearFilters() {
  ['f-canal','f-rep','f-bloqueio','f-tipopedido','f-uf'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-cliente').value='';
  applyFilters();
}

function doSort(col, toggle=true) {
  if (toggle) { sortDir = sortCol===col ? sortDir*-1 : -1; sortCol=col; }
  filtered.sort((a,b) => {
    let va=a[col],vb=b[col];
    if (typeof va==='number') return (va-vb)*sortDir;
    return ((va||'').toString().toLowerCase() < (vb||'').toString().toLowerCase() ? -1 : 1)*sortDir;
  });
  page=1; renderAll();
}

function renderKPIs() {
  const totalR = sum(filtered,'totalR'), fatR = sum(filtered,'faturadoR'),
        sepR = sum(filtered,'separacaoR'), alocR = sum(filtered,'alocadoR'),
        nAlocR = sum(filtered,'naoAlocadoR'), bloqR = sum(filtered,'bloqR');
  const clientes = new Set(filtered.map(r=>r.cliente+r.rep)).size;
  const reps = new Set(filtered.map(r=>r.rep)).size;
  const fatP = pct(fatR,totalR), nAP = pct(nAlocR,totalR);
  document.getElementById('kpis').innerHTML = `
    <div class="kpi c-green"><div class="kpi-lbl">Total Carteira</div><div class="kpi-val">${fmtM(totalR)}</div><div class="kpi-sub">${reps} reps · ${clientes} clientes</div></div>
    <div class="kpi c-green"><div class="kpi-lbl">Faturado</div><div class="kpi-val">${fmtM(fatR)}</div><div class="kpi-badge g">${fatP.toFixed(1)}%</div></div>
    <div class="kpi c-blue"><div class="kpi-lbl">Em Separação</div><div class="kpi-val">${fmtM(sepR)}</div><div class="kpi-sub">${pct(sepR,totalR).toFixed(1)}% do total</div></div>
    <div class="kpi c-orange"><div class="kpi-lbl">Alocado</div><div class="kpi-val">${fmtM(alocR)}</div><div class="kpi-sub">${pct(alocR,totalR).toFixed(1)}% do total</div></div>
    <div class="kpi c-red"><div class="kpi-lbl">Não Alocado</div><div class="kpi-val">${fmtM(nAlocR)}</div><div class="kpi-badge ${nAP>20?'r':'o'}">${nAP.toFixed(1)}%</div></div>
    <div class="kpi c-gray"><div class="kpi-lbl">Bloqueado</div><div class="kpi-val">${fmtM(bloqR)}</div><div class="kpi-sub">Alocado bloqueado</div></div>
  `;
}

function renderBarChart() {
  // Aggregate by rep
  const repMap = {};
  filtered.forEach(r => {
    if (!repMap[r.rep]) repMap[r.rep] = {totalR:0, faturadoR:0};
    repMap[r.rep].totalR += r.totalR;
    repMap[r.rep].faturadoR += r.faturadoR;
  });
  const entries = Object.entries(repMap).sort((a,b)=>b[1].totalR-a[1].totalR);
  const labels = entries.map(([k])=>k);
  const totals = entries.map(([,v])=>v.totalR);
  const fats = entries.map(([,v])=>v.faturadoR);

  if (barChart) barChart.destroy();
  const ctx = document.getElementById('chart-bar').getContext('2d');
  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {label:'Total Pedido R$', data:totals, backgroundColor:'rgba(26,107,42,0.75)', borderRadius:4, borderSkipped:false},
        {label:'Faturado R$', data:fats, backgroundColor:'rgba(76,175,100,0.7)', borderRadius:4, borderSkipped:false},
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{font:{family:'DM Sans',size:11},color:'#7e917f',boxWidth:12}},
        tooltip:{callbacks:{label:ctx=>'R$ '+ctx.raw.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0})}}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'DM Sans',size:10},color:'#7e917f',maxRotation:35}},
        y:{grid:{color:'#f0f2f0'},ticks:{font:{family:'DM Sans',size:10},color:'#7e917f',callback:v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v}}
      }
    }
  });
}

function renderPieChart() {
  // 3 categories: Sem Bloqueio, Financeiro, Comercial
  let semBloq=0, fin=0, com=0;
  filtered.forEach(r => {
    if (!r.tipoBloqueio || r.tipoBloqueio.trim()==='') semBloq += r.totalR;
    else if (r.tipoBloqueio==='FINANCEIRO') fin += r.totalR;
    else if (r.tipoBloqueio==='COMERCIAL') com += r.totalR;
  });
  if (pieChart) pieChart.destroy();
  const ctx = document.getElementById('chart-pie').getContext('2d');
  pieChart = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: ['Sem Bloqueio','Financeiro','Comercial'],
      datasets: [{
        data: [semBloq, fin, com],
        backgroundColor: ['#2d8f45','#e67e22','#c0392b'],
        borderWidth: 2, borderColor: '#fff',
        hoverOffset: 8,
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{position:'bottom',labels:{font:{family:'DM Sans',size:10},color:'#7e917f',boxWidth:10,padding:8}},
        tooltip:{callbacks:{label:ctx=>ctx.label+': R$ '+ctx.raw.toLocaleString('pt-BR',{minimumFractionDigits:0})+' ('+((ctx.raw/[semBloq,fin,com].reduce((a,b)=>a+b,0))*100).toFixed(1)+'%)'}}
      }
    }
  });
}

function renderDonutChart() {
  let cart=0, pe=0;
  filtered.forEach(r => {
    if (r.tipoPedido==='CARTEIRA') cart += r.totalR;
    else if (r.tipoPedido==='PRONTA ENTREGA') pe += r.totalR;
  });
  if (donutChart) donutChart.destroy();
  const ctx = document.getElementById('chart-donut').getContext('2d');
  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Carteira','Pronta Entrega'],
      datasets: [{
        data: [cart, pe],
        backgroundColor: ['#1a6b2a','#2471a3'],
        borderWidth: 2, borderColor: '#fff',
        hoverOffset: 8,
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      cutout: '62%',
      plugins:{
        legend:{position:'bottom',labels:{font:{family:'DM Sans',size:10},color:'#7e917f',boxWidth:10,padding:8}},
        tooltip:{callbacks:{label:ctx=>ctx.label+': R$ '+ctx.raw.toLocaleString('pt-BR',{minimumFractionDigits:0})+' ('+((ctx.raw/(cart+pe))*100).toFixed(1)+'%)'}}
      }
    }
  });
}

function renderMap() {
  // Aggregate totalR by UF
  const ufMap = {};
  filtered.forEach(r => {
    if (r.uf) ufMap[r.uf] = (ufMap[r.uf]||0) + r.totalR;
  });
  const maxVal = Math.max(...Object.values(ufMap), 1);

  // Brazil SVG — simplified bubble map (circles positioned by lat/lng)
  // Using a scaled SVG viewbox with lat/lng mapping
  // Brazil bounds: lat -33.8 to 5.3, lng -74 to -34
  const W=320, H=340;
  const mapLat = lat => ((lat - 5.3) / (-33.8 - 5.3)) * H;
  const mapLng = lng => ((lng - (-74)) / ((-34) - (-74))) * W;

  function lerp(a,b,t){return a+(b-a)*t}
  function valToColor(v){
    // Green gradient: pale to dark
    const t = v/maxVal;
    const r = Math.round(lerp(0xe8,0x0e,t));
    const g = Math.round(lerp(0xf5,0x4a,t));
    const b2 = Math.round(lerp(0xec,0x1c,t));
    return `rgb(${r},${g},${b2})`;
  }

  let circles = '';
  Object.entries(UF_COORDS).forEach(([uf, [lat,lng]]) => {
    const v = ufMap[uf] || 0;
    const t = v/maxVal;
    const cx = mapLng(lng);
    const cy = mapLat(lat);
    const r = 8 + t * 22;
    const col = v>0 ? valToColor(v) : '#e8f5ec';
    const stroke = v>0 ? 'rgba(14,74,28,0.3)' : '#c5cec6';
    circles += `<circle cx="${cx}" cy="${cy}" r="${r.toFixed(1)}" fill="${col}" stroke="${stroke}" stroke-width="1" opacity="0.9">
      <title>${uf}: R$ ${v.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0})}</title>
    </circle>
    <text x="${cx}" y="${cy}" class="uf-label">${uf}</text>`;
  });

  document.getElementById('map-container').innerHTML = `
    <svg id="map-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <rect width="${W}" height="${H}" fill="var(--gray50)" rx="6"/>
      ${circles}
    </svg>
  `;
}

function renderTable() {
  const total = filtered.length;
  const totalPg = Math.max(1, Math.ceil(total/PG));
  const rows = filtered.slice((page-1)*PG, page*PG);
  document.getElementById('r-count').innerHTML = `<span>${total.toLocaleString('pt-BR')}</span> clientes`;
  document.getElementById('pg-info').textContent = `Pág. ${page}/${totalPg}`;

  document.getElementById('tbl-head').innerHTML = COLS.map(c=>`
    <th class="${sortCol===c.k?'sorted':''}" onclick="doSort('${c.k}')">
      ${c.l} <span style="opacity:.5">${sortCol===c.k?(sortDir===-1?'↓':'↑'):''}</span>
    </th>`).join('');

  document.getElementById('tbl-body').innerHTML = rows.map(r => `<tr>${COLS.map(c => {
    const v = r[c.k];
    if (c.t==='text') return `<td>${v||'—'}</td>`;
    if (c.t==='num') return `<td class="mono">${typeof v==='number'?v.toLocaleString('pt-BR'):(v||'—')}</td>`;
    if (c.t==='money') return `<td class="money">${v?fmt(v):'—'}</td>`;
    if (c.t==='money-g') return `<td class="money g">${v&&v>0?fmt(v):'—'}</td>`;
    if (c.t==='money-o') return `<td class="money o">${v&&v>0?fmt(v):'—'}</td>`;
    if (c.t==='money-r') return `<td class="money r">${v&&v>0?fmt(v):'—'}</td>`;
    if (c.t==='money-b') return `<td class="money b">${v&&v>0?fmt(v):'—'}</td>`;
    if (c.t==='bdg-canal') return `<td><span class="bdg ${v==='KEY ACCOUNT'?'bdg-ka':'bdg-mm'}">${v||'—'}</span></td>`;
    if (c.t==='bdg-tp') return `<td><span class="bdg ${v==='PRONTA ENTREGA'?'bdg-pe':'bdg-cart'}">${v||'—'}</span></td>`;
    if (c.t==='bdg-blq') {
      if (!v) return '<td>—</td>';
      return `<td><span class="bdg ${v==='FINANCEIRO'?'bdg-fin':'bdg-com'}">${v}</span></td>`;
    }
    return `<td>${v||'—'}</td>`;
  }).join('')}</tr>`).join('');

  // Pagination
  const pag = document.getElementById('pagination');
  let h = `<button class="pbtn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  let sp = Math.max(1,page-2), ep = Math.min(totalPg,sp+4);
  if(ep-sp<4) sp=Math.max(1,ep-4);
  for(let i=sp;i<=ep;i++) h+=`<button class="pbtn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  h+=`<button class="pbtn" onclick="goPage(${page+1})" ${page===totalPg?'disabled':''}>›</button>`;
  pag.innerHTML = h;
}

function goPage(p2) {
  const totalPg = Math.max(1,Math.ceil(filtered.length/PG));
  if(p2<1||p2>totalPg) return;
  page=p2; renderTable();
  document.querySelector('.card').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderAll() {
  renderKPIs();
  renderBarChart();
  renderPieChart();
  renderDonutChart();
  renderMap();
  renderTable();
}

function exportCSV() {
  const h = COLS.map(c=>c.l).join(';');
  const rows = filtered.map(r=>COLS.map(c=>{
    const v=r[c.k];
    if(v===null||v===undefined||v==='') return '';
    if(typeof v==='number') return v.toString().replace('.',',');
    return '"'+String(v).replace(/"/g,'""')+'"';
  }).join(';'));
  const csv='\uFEFF'+[h,...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='carteira_ss26.csv'; document.body.appendChild(a); a.click();
  document.body.removeChild(a);
}

populateFilters();
applyFilters();
</script>
